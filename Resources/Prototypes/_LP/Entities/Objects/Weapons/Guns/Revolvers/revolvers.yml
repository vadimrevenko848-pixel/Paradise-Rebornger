- type: entity
  name: SDRE
  parent: [BaseItem, BaseSecurityContraband]
  id: LPPWeaponRevolverFieldEngineer
  description: Self defence revolver (Engineer) is the most cheapest weapon you can find available in the market. It feeds full .45 speedloaders and requres manual spin of the cylinder to reload.
  components:
  - type: Sprite
    sprite: _LP/Objects/Weapons/Guns/Revolvers/sdre.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
  - type: ItemSlots
    slots:
      gun_magazine:
        startingItem: SpeedLoaderMagnum
        insertSound: /Audio/Weapons/Guns/MagIn/rifle_load.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/sfrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - SpeedLoaderMagnum
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        priority: 1
        whitelist:
          tags:
          - CartridgeMagnum
  - type: Gun
    fireRate: 5
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/batrifle.ogg
  - type: ChamberMagazineAmmoProvider
    autoCycle: false
    autoEject: false
    soundAutoEject:
      path: /Audio/_GoobStation/Weapons/Guns/MagOut/garand_eject.ogg
    soundRack:
      path: /Audio/Weapons/Guns/Cock/batrifle_cock.ogg
      params:
        volume: -3
    soundBoltClosed:
      path: /Audio/_GoobStation/Weapons/Guns/Bolt/lever_bolt_closed.ogg
      params:
        volume: -3
    soundBoltOpened:
      path: /Audio/_GoobStation/Weapons/Guns/Bolt/lever_bolt_opened.ogg
      params:
        volume: -3
  - type: Appearance
  - type: UseDelay
    delay: 0.8
  - type: Item
    size: Small
    shape:
    - 1,0,1,0
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
        showEnts: False
        occludes: True
        ent: null
      gun_chamber: !type:ContainerSlot
        showEnts: False
        occludes: True
        ent: null
