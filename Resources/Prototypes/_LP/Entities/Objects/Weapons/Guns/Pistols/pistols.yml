- type: entity
  name: Hippocratic oath
  parent: WeaponPistolMk58
  id: LPPWeaponPistolHippocraticoath
  description: Ze healing is not rewarding as ze hurting! Uses .35 ammo.
  components:
  - type: Sprite
    sprite: _LP/Objects/Weapons/Guns/Pistols/m1911.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _LP/Objects/Weapons/Guns/Pistols/m1911.rsi
  - type: Gun
    fireRate: 7
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/pistol.ogg

- type: entity
  parent: [BaseItem, BaseSyndicateContraband]
  id: LPPWeaponNailGun
  name: Self Charge P-12 "Nail Gun"
  description: Self recharing weapon that fires nail-like projectiles. Pretty deadly.
  components:
  - type: Sprite
    sprite: _LP/Objects/Weapons/Guns/Pistols/Nailgun.rsi
    layers:
    - state: icon
  - type: Item
    sprite: _LP/Objects/Weapons/Guns/Pistols/Nailgun.rsi
    size: Small
    shape:
    - 0,0,2,0
    - 0,1,1,0
  - type: Gun
    fireRate: 4
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/click.ogg
      params:
        volume: 7
  - type: AmmoCounter
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.AmmoVisuals.HasAmmo:
        empty-icon:
          True: { visible: False }
          False: { visible: True }
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 0.9
  - type: BasicEntityAmmoProvider
    proto: LPPNail
    capacity: 15
    count: 15
  - type: Clothing
    sprite: _LP/Objects/Weapons/Guns/Pistols/Nailgun.rsi
    quickEquip: false
    slots:
    - Belt
    - suitStorage
  - type: FiringPinHolder
    supportedPins: [ AdvancedLaser ]
  - type: ContainerContainer
    containers:
      firing_pin: !type:Container # Starlight
  - type: ContainerFill
    containers:
      firing_pin:
      - FiringPinPistol
