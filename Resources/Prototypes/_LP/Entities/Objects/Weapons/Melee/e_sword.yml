- type: entity
  name: energy broadsword
  parent: EnergySword
  id: LPPEnergyBroadsword
  description: A very loud & even more dangerous sword with a beam made of pure, concentrated plasma. Cuts through unarmored targets like butter.
  components:
  - type: EnergySword
  - type: ItemToggle
    soundActivate:
      path: /Audio/Weapons/ebladeon.ogg
    soundDeactivate:
      path: /Audio/Weapons/ebladeoff.ogg
  - type: ItemToggleActiveSound
    activeSound:
      path: /Audio/Weapons/ebladehum.ogg
  - type: ItemToggleHot
  - type: ItemToggleSize
    activatedSize: Huge
  - type: ItemToggleMeleeWeapon
    activatedSoundOnHit:
      path: /Audio/Weapons/eblade1.ogg
      params:
        variation: 0.250
    activatedSoundOnHitNoDamage:
      path: /Audio/Weapons/eblade1.ogg
      params:
        variation: 0.250
        volume: -10
    activatedSoundOnSwing:
      path: /Audio/Weapons/eblademiss.ogg
      params:
        variation: 0.125
    activatedDamage:
        types:
            Slash: 12.5
            Heat: 22.5
            Structural: 50
  - type: Sprite
    sprite: _LP/Objects/Weapons/Melee/e_swordbig.rsi
    layers:
      - state: e_sword
      - state: e_sword_blade
        color: "#FFFFFF"
        visible: false
        shader: unshaded
        map: [ "blade" ]
  - type: MeleeWeapon
    wideAnimationRotation: -45
    attackRate: 0.9
    damage:
      types:
        Blunt: 7.5
  - type: Item
    size: Normal
    sprite: _LP/Objects/Weapons/Melee/e_swordbig-inhands.rsi
  - type: UseDelay
    delay: 1.5
  - type: PointLight
    enabled: false
    radius: 3
    energy: 3
    color: white
    netsync: false
  - type: Appearance
  - type: DisarmMalus
    malus: 0
  - type: Reflect
    reflectProb: 0.35
    spread: 10
  - type: IgnitionSource
    temperature: 700
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
