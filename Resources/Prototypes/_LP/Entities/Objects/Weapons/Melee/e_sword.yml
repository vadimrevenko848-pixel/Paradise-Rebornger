- type: entity
  name: energy axe
  parent: EnergySwordDouble
  id: LPPEnergyAxe
  description: Syndicate engineer's intern thought that having only energy swords was not cool enough.
  components:
  - type: EnergySword
  - type: ItemToggle
    soundActivate:
      path: /Audio/Weapons/ebladeon.ogg
      params:
        volume: 5
    soundDeactivate:
      path: /Audio/Weapons/ebladeoff.ogg
      params:
        volume: 5
  - type: ItemToggleMeleeWeapon
    activatedSoundOnSwing:
      path: /Audio/Weapons/eblademiss.ogg
      params:
        volume: 5
        variation: 0.250
    activatedDamage:
        types:
            Slash: 15
            Heat: 25
            Structural: 275
  - type: ItemToggleActiveSound
    activeSound:
      path: /Audio/Weapons/ebladehum.ogg
      params:
        volume: 3
  - type: Wieldable
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 0.7
    angle: 100
    damage:
      types:
        Blunt: 12
  - type: Sprite
    sprite: _LP/Objects/Weapons/Melee/e_axe.rsi
    layers:
      - state: e_axe
      - state: e_axe_blade
        color: "#FFFFFF"
        visible: false
        shader: unshaded
        map: [ "blade" ]
  - type: Item
    size: Huge
    sprite: _LP/Objects/Weapons/Melee/e_axe-inhands.rsi
  - type: Reflect
    reflectProb: 0.5
    spread: 120
    reflects:
      - Energy
  - type: UseDelay
    delay: 1
  - type: IgniteOnMeleeHit
    fireStacks: 0.5
  - type: SpeedModifiedOnWield
    walkModifier: 0.95
    sprintModifier: 0.95

