- type: entity
  parent: BaseItem
  id: LPPBaseBlueprintProtolathe
  name: blueprint
  description: A blueprint for some machine. It can be inserted into an protolathe or techfab.
  abstract: true
  components:
  - type: Sprite
    sprite: Objects/Tools/blueprint.rsi
    state: icon
  - type: Item
    size: Normal
    shape:
    - 0,0,2,0
    storedSprite:
      sprite: Objects/Tools/blueprint.rsi
      state: storage
  - type: Blueprint
  - type: StaticPrice
    price: 1000
  - type: Tag
    tags:
    - BlueprintProtolathe

- type: entity
  parent: BaseItem
  id: LPPBaseBlueprintSpaceForge
  name: blueprint
