- type: entity
  parent: GasCanister
  id: BZCanister
  name: bz canister
  components:
  - type: Sprite
    sprite: _AruMoon/Structures/Storage/canister.rsi
    layers:
    - state: purple
  - type: GasCanister
    gasMixture:
      volume: 1000
      moles:
        BZ: 1871.71051
      temperature: 293.15
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 600
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          BZCanisterBroken:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:DumpCanisterBehavior
  - type: Lock
    locked: true

